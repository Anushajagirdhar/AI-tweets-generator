<!DOCTYPE html>
<html>
<head>
<title>Generated Tweets</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
margin:0;
padding:40px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
color:#333;
}

.voice li{
margin:6px 0;
}

.tweet{
background:#eef4ff;
padding:15px;
margin:12px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.copy-btn{
background:#4facfe;
border:none;
color:white;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.copy-btn:hover{
background:#2c8ef4;
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 18px;
background:#4facfe;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

<script>

function copyText(text){

navigator.clipboard.writeText(text);
alert("Tweet copied!");

}

</script>

</head>

<body>

<div class="container">

<h2>Brand Voice</h2>

<ul class="voice">

{% for v in voice %}
<li>{{v}}</li>
{% endfor %}

</ul>

<h2>Generated Tweets</h2>

{% for tweet in tweets %}

<div class="tweet">

<span>{{loop.index}}. {{tweet}}</span>

<button class="copy-btn"
onclick="copyText('{{tweet}}')">
Copy
</button>

</div>

{% endfor %}

<a class="back" href="/">Generate Again</a>

</div>

</body>
</html>
